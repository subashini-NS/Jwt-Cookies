server.port=${PORT:5000}
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/auth}
spring.data.mongodb.auto-index-creation=${MONGO_AUTO_INDEX_CREATION:false}

app.client-url=${CLIENT_URL:http://localhost:5173}
app.node-env=${NODE_ENV:development}
app.jwt.access-secret=${ACCESS_TOKEN_SECRET:super_access_secret}
app.jwt.refresh-secret=${REFRESH_TOKEN_SECRET:super_refresh_secret}
app.jwt.access-expiry=${ACCESS_TOKEN_EXPIRY:15m}
app.jwt.refresh-expiry=${REFRESH_TOKEN_EXPIRY:30d}
